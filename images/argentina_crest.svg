<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <!-- Three World Cup Stars -->
  <g fill="#FFD700" stroke="#B8860B" stroke-width="0.5">
    <!-- Left Star -->
    <polygon points="30,17 33,24 41,24 35,29 37,36 30,31 23,36 25,29 19,24 27,24" />
    <!-- Center Star (elevated) -->
    <polygon points="50,7 53,14 61,14 55,19 57,26 50,21 43,26 45,19 39,14 47,14" />
    <!-- Right Star -->
    <polygon points="70,17 73,24 81,24 75,29 77,36 70,31 63,36 65,29 59,24 67,24" />
  </g>

  <!-- Golden Shield Outer -->
  <path d="M15,40 C15,40 15,95 50,115 C85,95 85,40 85,40 L15,40 Z" fill="#D4AF37" stroke="#996515" stroke-width="2" />
  
  <!-- Shield Inner -->
  <path d="M20,44 C20,44 20,90 50,108 C80,90 80,44 80,44 L20,44 Z" fill="#000000" opacity="0.1" />
  
  <!-- Argentine Stripes inside Shield -->
  <g opacity="0.85">
    <rect x="25" y="44" width="10" height="50" fill="#75AADB" />
    <rect x="35" y="44" width="10" height="54" fill="#FFFFFF" />
    <rect x="45" y="44" width="10" height="57" fill="#75AADB" />
    <rect x="55" y="44" width="10" height="54" fill="#FFFFFF" />
    <rect x="65" y="44" width="10" height="50" fill="#75AADB" />
  </g>

  <!-- Golden monogram AFA/Crest letters -->
  <text x="50" y="78" font-family="'Cinzel', 'Georgia', serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">AFA</text>
  
  <!-- Laurel Wreath or decorative details -->
  <path d="M25,85 C32,95 42,98 50,105 C58,98 68,95 75,85" fill="none" stroke="#FFD700" stroke-width="1.5" stroke-dasharray="3,3" />
</svg>
